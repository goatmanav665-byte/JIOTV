<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMV LIVE - Premium Streaming</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: radial-gradient(circle at top right, #1e40af, transparent), radial-gradient(circle at bottom left, #1e1b4b, transparent); }
        .channel-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .channel-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5); border-color: #3b82f6; }
        .live-indicator { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .search-input:focus { box-shadow: 0 0 0 2px #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="hero-gradient min-h-screen">
    <header class="sticky top-0 z-50 glass px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <h1 class="text-2xl font-extrabold tracking-tighter text-blue-500">CMV<span class="text-white">LIVE</span></h1>
        <div class="relative w-full max-w-md">
            <input id="searchBox" type="text" placeholder="Search channels, sports, news..." 
                   class="w-full bg-slate-900/50 border border-slate-700 rounded-full py-2 px-5 outline-none text-sm transition-all search-input"
                   oninput="filterChannels()">
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <section class="mb-10 rounded-3xl p-8 glass flex flex-col justify-center min-h-[250px] relative overflow-hidden">
            <div class="relative z-10">
                <span class="bg-blue-600 text-[10px] font-bold px-2 py-1 rounded uppercase mb-4 inline-block">Featured</span>
                <h2 class="text-4xl md:text-5xl font-black mb-2">Non-Stop Entertainment</h2>
                <p class="text-slate-400 max-w-lg">Stream your favorite channels in Ultra HD with zero lag. All matches and news in one place.</p>
            </div>
            <div class="absolute right-0 top-0 w-1/2 h-full opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        </section>

        <div id="channelGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-5">
            <div class="animate-pulse bg-slate-800 rounded-2xl h-48"></div>
            <div class="animate-pulse bg-slate-800 rounded-2xl h-48"></div>
            <div class="animate-pulse bg-slate-800 rounded-2xl h-48"></div>
        </div>
    </main>

    <script>
        let allChannels = [];
        async function initApp() {
            try {
                const res = await fetch("https://pkll.xojiv79335.workers.dev/");
                const data = await res.json();
                allChannels = data.map(ch => ({ 
                    id: ch.id || ch.channel_id, 
                    name: ch.name || ch.channel_name, 
                    logo: ch.logo || ch.channel_logo 
                }));
                renderChannels(allChannels);
            } catch (e) { console.error(e); }
        }

        function renderChannels(channels) {
            const grid = document.getElementById("channelGrid");
            grid.innerHTML = channels.map(ch => `
                <div class="channel-card glass rounded-2xl p-4 cursor-pointer border border-transparent" onclick="location.href='player.html?id=${ch.id}'">
                    <div class="aspect-video mb-3 flex items-center justify-center bg-slate-900/50 rounded-xl overflow-hidden">
                        <img src="${ch.logo}" alt="${ch.name}" class="w-20 h-20 object-contain" onerror="this.src='https://placehold.co/200x200/1e293b/white?text=TV'">
                    </div>
                    <div class="flex items-center text-[10px] text-slate-400 mb-1">
                        <span class="live-indicator"></span> LIVE
                    </div>
                    <h3 class="font-bold text-sm truncate pr-2">${ch.name}</h3>
                </div>
            `).join('');
        }

        function filterChannels() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(term)));
        }
        document.addEventListener("DOMContentLoaded", initApp);
    </script>
</body>
</html>
