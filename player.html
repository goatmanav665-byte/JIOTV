<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMV LIVE Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100vh; width: 100vw; overflow: hidden; color: white; }
        
        /* FIXED: Full Screen Centering for PC & Mobile */
        .shaka-video-container {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Remove Shaka Spinner & Duplicate Play Buttons */
        .shaka-spinner-container { display: none !important; }
        [data-shaka-player-container].shaka-playing > .shaka-controls-container > .shaka-play-button-container { display: none !important; }

        /* Premium Top Bar Overlay */
        .top-bar { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            padding: 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            z-index: 50; 
            display: flex; 
            align-items: center; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .top-bar.hide { transform: translateY(-100%); opacity: 0; }
        
        /* Modern Alert UI */
        .alert-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Shaka Control Bar Styling */
        .shaka-bottom-controls { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent) !important; padding-bottom: 12px !important; }
        .shaka-range-element { cursor: pointer; }
    </style>
</head>
<body>

    <div id="player-container" data-shaka-player-container class="shaka-video-container">
        
        <div class="top-bar" id="topBar">
            <button onclick="location.href='index.html'" class="mr-4 bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <img id="chLogo" src="" class="w-10 h-10 object-contain mr-3 rounded-xl bg-black/50 p-1">
            <div>
                <h2 id="chTitle" class="text-sm font-extrabold tracking-tight">CMV LIVE</h2>
                <p class="text-[10px] text-blue-400 font-semibold uppercase tracking-widest">Ultra HD Streaming</p>
            </div>
        </div>

        <video autoplay playsinline id="video" class="shaka-video"></video>
    </div>

    <div id="teleAlert" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/70 backdrop-blur-md">
        <div class="alert-modal p-8 rounded-[32px] text-center max-w-xs shadow-2xl scale-110">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-5 flex items-center justify-center shadow-lg shadow-blue-600/40">
                <svg width="40" height="40" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .33z"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-2">Join Our Crew</h3>
            <p class="text-sm text-slate-400 mb-8 px-4 leading-relaxed">Get all match updates and high-speed server links instantly.</p>
            <button onclick="window.open('https://t.me/cricketmemesverse873')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-extrabold transition-all mb-4">JOIN TELEGRAM</button>
            <button onclick="document.getElementById('teleAlert').remove()" class="text-xs font-bold text-slate-500 hover:text-white uppercase tracking-widest">Dismiss</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <script>
        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch("https://pkll.xojiv79335.workers.dev/");
            const data = await res.json();
            const ch = data.find(c => (c.id || c.channel_id) == id);

            if (!ch) return;

            shaka.polyfill.installAll();
            
            const video = document.getElementById('video');
            const container = document.getElementById('player-container');
            const player = new shaka.Player(video);
            
            // Initializing UI properly
            const ui = new shaka.ui.Overlay(player, container, video);
            ui.configure({ 
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'fullscreen'],
                'addBigPlayButton': false 
            });

            // FIXED: DRM & Cookie Persistence logic from working code
            player.configure({
                drm: { clearKeys: { [ch.keyId || ch.key_id]: ch.key } },
                streaming: { 
                    lowLatencyMode: true, 
                    useNativeHlsOnSafari: true,
                    bufferingGoal: 15 
                }
            });

            player.getNetworkingEngine().registerRequestFilter((type, req) => {
                req.headers['Referer'] = 'https://www.jiotv.com/';
                req.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                
                if (ch.cookie) {
                    req.headers["Cookie"] = ch.cookie;
                    // Persist token in segment URLs
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                        if (!req.uris[0].includes("__hdnea__")) {
                            const sep = req.uris[0].includes("?") ? "&" : "?";
                            req.uris[0] += sep + ch.cookie;
                        }
                    }
                }
            });

            try {
                document.getElementById('chTitle').textContent = ch.name || ch.channel_name;
                document.getElementById('chLogo').src = ch.logo || ch.channel_logo;
                
                await player.load(ch.url || ch.stream_url || ch.channel_url);
                
                // Show Telegram alert after 4 seconds
                setTimeout(() => document.getElementById('teleAlert').classList.remove('hidden'), 4000);
                // Hide top bar after 6 seconds
                window.hideTimer = setTimeout(() => document.getElementById('topBar').classList.add('hide'), 6000);
            } catch (e) { console.error("Playback Error", e); }
        }

        // Re-show top bar on interaction
        function showUI() {
            const bar = document.getElementById('topBar');
            bar.classList.remove('hide');
            clearTimeout(window.hideTimer);
            window.hideTimer = setTimeout(() => bar.classList.add('hide'), 4000);
        }

        document.addEventListener('mousemove', showUI);
        document.addEventListener('touchstart', showUI);
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
