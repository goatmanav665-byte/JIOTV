<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMV LIVE Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100vh; width: 100vw; overflow: hidden; color: white; }
        #video-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; }
        
        /* Hide Shaka Default Spinner & Play button */
        .shaka-spinner-container { display: none !important; }
        [data-shaka-player-container].shaka-playing > .shaka-controls-container > .shaka-play-button-container { display: none !important; }

        /* Custom Overlay Info */
        .top-bar { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 20; display: flex; align-items: center; transition: all 0.5s; }
        .top-bar.hide { transform: translateY(-100%); opacity: 0; }
        
        /* Glass Alert */
        .alert-modal { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Better Control Bar Background */
        .shaka-bottom-controls { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent) !important; padding-bottom: 10px !important; }
    </style>
</head>
<body>

    <div id="video-container" data-shaka-player-container>
        <div class="top-bar" id="topBar">
            <button onclick="location.href='index.html'" class="mr-4 bg-white/10 p-2 rounded-full hover:bg-white/20">
                <svg width="20" height="20" fill="white" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
            </button>
            <img id="chLogo" src="" class="w-10 h-10 object-contain mr-3 rounded-lg bg-black/40 p-1">
            <div>
                <h2 id="chTitle" class="text-sm font-bold leading-tight">Syncing...</h2>
                <p class="text-[10px] text-blue-400">Ultra HD | Low Latency</p>
            </div>
        </div>

        <video autoplay playsinline id="video" class="shaka-video"></video>
    </div>

    <div id="teleAlert" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="alert-modal p-8 rounded-3xl text-center max-w-xs shadow-2xl border border-white/10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-600/30">
                <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .33z"/></svg>
            </div>
            <h3 class="text-xl font-bold mb-2">Join Telegram</h3>
            <p class="text-sm text-slate-400 mb-6">Get daily match links and instant server updates!</p>
            <button onclick="window.open('https://t.me/cricketmemesverse873')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all mb-3">Join Group</button>
            <button onclick="document.getElementById('teleAlert').remove()" class="text-xs text-slate-500 hover:text-white">Maybe Later</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <script>
        async function start() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch("https://pkll.xojiv79335.workers.dev/");
            const data = await res.json();
            const ch = data.find(c => (c.id || c.channel_id) == id);

            if (!ch) return;

            shaka.polyfill.installAll();
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            const container = document.getElementById('video-container');
            const ui = new shaka.ui.Overlay(player, container, video);

            ui.configure({ 'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'fullscreen'] });

            // DRM & Performance Config
            player.configure({
                drm: { clearKeys: { [ch.keyId || ch.key_id]: ch.key } },
                streaming: { lowLatencyMode: true, useNativeHlsOnSafari: true }
            });

            // Request Filter for Cookies/Headers
            player.getNetworkingEngine().registerRequestFilter((type, req) => {
                req.headers['Referer'] = 'https://www.jiotv.com/';
                req.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
                
                if (ch.cookie) {
                    req.headers["Cookie"] = ch.cookie;
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                        if (!req.uris[0].includes("__hdnea__")) {
                            const sep = req.uris[0].includes("?") ? "&" : "?";
                            req.uris[0] += sep + ch.cookie;
                        }
                    }
                }
            });

            try {
                document.getElementById('chTitle').textContent = ch.name || ch.channel_name;
                document.getElementById('chLogo').src = ch.logo || ch.channel_logo;
                await player.load(ch.url || ch.stream_url || ch.channel_url);
                
                // Show UI elements
                setTimeout(() => document.getElementById('teleAlert').classList.remove('hidden'), 4000);
                setTimeout(() => document.getElementById('topBar').classList.add('hide'), 6000);
            } catch (e) { console.error(e); }
        }

        // Show top bar on mouse move
        document.addEventListener('mousemove', () => {
            const bar = document.getElementById('topBar');
            bar.classList.remove('hide');
            clearTimeout(window.hideTimer);
            window.hideTimer = setTimeout(() => bar.classList.add('hide'), 3000);
        });

        document.addEventListener('DOMContentLoaded', start);
    </script>
</body>
</html>
